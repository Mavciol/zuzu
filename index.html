<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zuzu Crush</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-grad-1: #a1c4fd;
            --bg-grad-2: #c2e9fb;
            --panel-bg: rgba(255, 255, 255, 0.65);
            --text-color: #4a5568;
            --primary-color: #fb85b4;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            font-family: 'Fredoka', sans-serif;
        }

        @keyframes bgAnim {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        body {
            background: linear-gradient(-45deg, #ff9a9e, #fecfef, #a1c4fd, #c2e9fb);
            background-size: 400% 400%;
            animation: bgAnim 15s ease infinite;
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--text-color);
            position: relative;
        }

        /* Soft Pixel / Sparkle overlay */
        body::before {
            content: '';
            position: absolute;
            inset: 0;
            background-image: radial-gradient(rgba(255,255,255,0.4) 1px, transparent 1px);
            background-size: 24px 24px;
            pointer-events: none;
            z-index: 0;
        }

        /* Splash Screen */
        #splash-screen {
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, #1a0b2e 0%, #4a2c7a 50%, #2b1055 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            transition: opacity 1s ease;
        }

        #splash-logo {
            width: 80vw;
            max-width: 350px;
            animation: float 3s ease-in-out infinite;
            filter: drop-shadow(0 10px 20px rgba(0, 0, 0, 0.3));
            margin-bottom: 30px;
            margin-top: 20px;
        }

        .gradient-text {
            background: linear-gradient(45deg, #ff758c 0%, #ff7eb3 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 5.5rem;
            font-weight: 900;
            margin-top: 0;
            margin-bottom: 0;
            text-align: center;
            line-height: 1.1;
            filter: drop-shadow(2px 4px 6px rgba(255, 117, 140, 0.3));
        }

        #play-btn {
            margin-top: 20px;
            padding: 16px 50px;
            font-size: 1.6rem;
            font-weight: 700;
            color: white;
            background: linear-gradient(45deg, #ff758c 0%, #ff7eb3 100%);
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(255, 117, 140, 0.4);
            transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.2s;
        }

        #play-btn:hover {
            transform: scale(1.08) translateY(-5px);
            box-shadow: 0 15px 25px rgba(255, 117, 140, 0.6);
        }

        #play-btn:active {
            transform: scale(0.95);
        }

        /* Game UI */
        #game-container {
            position: relative;
            width: 100%;
            height: 100%;
            display: none;
            flex-direction: column;
            align-items: center;
            padding-top: 20px;
            z-index: 1;
        }

        #header {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            width: 100%;
            max-width: 500px;
            padding: 0 15px;
            margin-bottom: 15px;
        }

        .stat-box {
            background: var(--panel-bg);
            padding: 10px 15px;
            border-radius: 15px;
            font-size: 1.2rem;
            font-weight: 600;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            border: 2px solid white;
            text-align: center;
            backdrop-filter: blur(5px);
        }

        .stat-box span {
            display: block;
            font-size: 0.8rem;
            color: #718096;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 2px;
        }

        #level-progress {
            width: 100%;
            max-width: 500px;
            height: 12px;
            background: rgba(255,255,255,0.5);
            border-radius: 10px;
            margin-bottom: 15px;
            overflow: hidden;
            border: 2px solid white;
        }

        #level-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #4facfe 0%, #00f2fe 100%);
            transition: width 0.4s ease;
        }

        #board-wrapper {
            position: relative;
            width: 90vw;
            max-width: 500px;
            aspect-ratio: 1;
            background: var(--panel-bg);
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            backdrop-filter: blur(10px);
            border: 3px solid white;
            padding: 5px;
            overflow: hidden; /* so dropping candies from above are hidden */
        }

        #board {
            position: relative;
            width: 100%;
            height: 100%;
        }

        .candy {
            position: absolute;
            width: calc(100% / var(--grid-size, 8));
            height: calc(100% / var(--grid-size, 8));
            padding: 3px; /* spacing */
            cursor: pointer;
            /* Realist physics drop transition: cubic bezier bounce for top */
            transition: top 0.45s cubic-bezier(0.34, 1.56, 0.64, 1), 
                        left 0.3s ease-in-out,
                        transform 0.2s ease,
                        opacity 0.2s ease;
            touch-action: none; /* For mobile dragging */
        }
        
        .candy-inner {
            width: 100%;
            height: 100%;
            background-size: contain;
            background-position: center;
            background-repeat: no-repeat;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.15));
            border-radius: 50%;
        }

        .candy:hover .candy-inner {
            transform: scale(1.1);
        }

        .candy.popping {
            transform: scale(0);
            opacity: 0;
        }

        /* Zuzu VN Area */
        #zuzu-area {
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            max-width: 700px;
            height: 220px;
            pointer-events: none;
            display: flex;
            align-items: flex-end;
            justify-content: flex-start;
            padding: 20px;
            z-index: 10;
        }

        #zuzu-img {
            height: 220px;
            flex-shrink: 0;
            object-fit: contain;
            filter: drop-shadow(0 15px 25px rgba(0,0,0,0.15));
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            animation: float 4s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        #dialog-box {
            background: var(--panel-bg);
            border: 3px solid white;
            border-radius: 20px;
            padding: 20px 25px;
            margin-left: 20px;
            margin-bottom: 30px;
            flex-grow: 1;
            min-height: 100px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            backdrop-filter: blur(10px);
            position: relative;
        }

        /* Tail of speech bubble */
        #dialog-box::before {
            content: '';
            position: absolute;
            left: -16px;
            bottom: 30px;
            border-width: 15px 18px 15px 0;
            border-style: solid;
            border-color: transparent white transparent transparent;
        }
        
        #dialog-text {
            font-size: 1.3rem;
            line-height: 1.5;
            font-weight: 600;
            color: var(--text-color);
            /* VERY IMPORTANT: preserves spaces between words */
            white-space: pre-wrap; 
        }

        .floating-score {
            position: absolute;
            background: linear-gradient(45deg, #f6d365 0%, #fda085 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 900;
            font-size: 1.8rem;
            pointer-events: none;
            animation: floatScore 1s ease-out forwards;
            filter: drop-shadow(2px 2px 2px rgba(0,0,0,0.1));
            z-index: 20;
        }

        @keyframes floatScore {
            0% { transform: translateY(0) scale(1); opacity: 1; }
            50% { transform: translateY(-30px) scale(1.3); opacity: 1; }
            100% { transform: translateY(-60px) scale(1.5); opacity: 0; }
        }

        /* Level Up Overlay */
        #level-up-msg {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 4rem;
            font-weight: 900;
            color: white;
            text-shadow: 0 5px 15px rgba(0,0,0,0.2);
            background: rgba(255,255,255,0.4);
            backdrop-filter: blur(5px);
            z-index: 50;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
            border-radius: 20px;
        }

        /* Quests */
        .quest-box {
            background: rgba(255, 255, 255, 0.4);
            border: 2px dashed var(--primary-color);
            padding: 10px 15px;
            border-radius: 15px;
            margin-bottom: 15px;
            width: 100%;
            max-width: 500px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            backdrop-filter: blur(5px);
            transition: all 0.3s;
        }

        .quest-text {
            font-size: 1.1rem;
            font-weight: 700;
            color: #d81b60;
            display: flex;
            align-items: center;
        }

        .quest-progress {
            font-size: 1.2rem;
            font-weight: 900;
            color: #4a5568;
        }

        /* Particles */
        .particle {
            position: absolute;
            width: 20px;
            height: 20px;
            background-size: cover;
            border-radius: 50%;
            pointer-events: none;
            z-index: 100;
            animation: popOut 0.6s cubic-bezier(0.25, 1, 0.5, 1) forwards;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.2));
        }
        @keyframes popOut {
            0% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
            100% { transform: translate(calc(-50% + var(--tx)), calc(-50% + var(--ty))) scale(0.2) rotate(180deg); opacity: 0; }
        }

        /* Hint Animation */
        .hint-anim .candy-inner {
            animation: hintPulse 1.5s ease infinite;
            filter: drop-shadow(0 0 10px rgba(255,255,255,0.8)) brightness(1.2);
        }
        @keyframes hintPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.15) rotate(10deg); }
        }

        @media (max-width: 600px) {
            #zuzu-area { height: 130px; padding: 5px; }
            #zuzu-img { height: 130px; }
            #dialog-box { padding: 12px; margin-left: 10px; margin-bottom: 10px; min-height: 60px; border-width: 2px; }
            #dialog-box::before { left: -10px; bottom: 15px; border-width: 10px 12px 10px 0; }
            #dialog-text { font-size: 0.95rem; line-height: 1.3; }
            .gradient-text { font-size: 3.5rem; }
            #header { padding: 0 5px; margin-bottom: 10px; }
            .stat-box { font-size: 0.9rem; padding: 6px 10px; }
            #board-wrapper { width: 95vw; border-width: 2px; padding: 3px; }
            #level-progress { margin-bottom: 10px; }
            #splash-logo { width: 85vw; }
        }
    </style>
</head>
<body>

    <!-- Splash Screen -->
    <div id="splash-screen">
        <div class="gradient-text">Zuzu Crush</div>
        <img id="splash-logo" src="Logo/logo.png" alt="MirrCat Logo">
        <button id="play-btn">Oyuna Başla</button>
    </div>

    <!-- Game UI -->
    <div id="game-container">
        <div id="header">
            <div class="stat-box">
                <span>Bölüm</span>
                <div id="level-txt" style="color: #fb85b4;">1</div>
            </div>
            <div class="stat-box">
                <span>Puan</span>
                <div id="score-txt" style="color: #4facfe;">0</div>
            </div>
            <div class="stat-box">
                <span>Hedef</span>
                <div id="target-txt" style="color: #f6d365;">500</div>
            </div>
        </div>

        <div id="quest-container" class="quest-box">
            <span class="quest-text" id="quest-desc">Görev Bekleniyor...</span>
            <span class="quest-progress" id="quest-prog">0/0</span>
        </div>

        <div id="level-progress"><div id="level-bar"></div></div>

        <div id="board-wrapper">
            <div id="level-up-msg">Bölüm Atladın!</div>
            <div id="board"></div>
        </div>

        <div id="zuzu-area">
            <img id="zuzu-img" src="Zuzu/stand_happy.png" alt="Zuzu">
            <div id="dialog-box">
                <span id="dialog-text"></span>
            </div>
        </div>
    </div>

    <script>
        // --- Sound System (Web Audio API) ---
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        function playTone(freq, type, duration, vol=0.1) {
            if(audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            
            gainNode.gain.setValueAtTime(vol, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
            
            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            
            osc.start();
            osc.stop(audioCtx.currentTime + duration);
        }

        const sounds = {
            swap: () => playTone(600, 'sine', 0.1, 0.05),
            match: () => {
                playTone(800, 'sine', 0.1, 0.1);
                setTimeout(() => playTone(1200, 'triangle', 0.15, 0.08), 100);
            },
            fall: () => playTone(400, 'sine', 0.05, 0.01),
            talk: () => playTone(500 + Math.random()*200, 'sine', 0.04, 0.02),
            levelup: () => {
                playTone(400, 'triangle', 0.2, 0.1);
                setTimeout(() => playTone(600, 'triangle', 0.2, 0.1), 150);
                setTimeout(() => playTone(800, 'triangle', 0.4, 0.1), 300);
            }
        };

        // --- Core Game Variables & Level Progression ---
        const boardEl = document.getElementById('board');
        const scoreTxt = document.getElementById('score-txt');
        const levelTxt = document.getElementById('level-txt');
        const targetTxt = document.getElementById('target-txt');
        const levelBar = document.getElementById('level-bar');
        const levelUpMsg = document.getElementById('level-up-msg');

        let currentLevel = 0;
        let score = 0;
        let isProcessing = false;

        const allCandyTypes = [
            'Icons - no bg/1.png', 'Icons - no bg/2.png', 'Icons - no bg/3.png', 
            'Icons - no bg/4.png', 'Icons - no bg/5.png', 'Icons - no bg/6.png', 'Icons - no bg/7.png'
        ];
        
        const levels = [
            { target: 500, colors: 4 },
            { target: 1500, colors: 5 },
            { target: 3000, colors: 6 },
            { target: 5000, colors: 7 },
            { target: 8000, colors: 7 },
            { target: 12000, colors: 7 },
            { target: 20000, colors: 7 },
            { target: Infinity, colors: 7 }
        ];

        function calculateGridSize() {
            let baseSize = 5 + currentLevel; 
            if (baseSize > 8) baseSize = 8;
            let isMobile = window.innerWidth <= 800;
            if (isMobile && baseSize > 6) baseSize = 6;
            return baseSize;
        }

        let width = calculateGridSize();
        let cellSize = 100 / width;
        document.documentElement.style.setProperty('--grid-size', width);
        let grid = new Array(width * width).fill(null);
        let activeCandies = []; // list of active candy objects
        let dragSrcCandy = null;
        
        window.addEventListener('resize', () => {
            const newWidth = calculateGridSize();
            if (newWidth !== width) {
                width = newWidth;
                cellSize = 100 / width;
                document.documentElement.style.setProperty('--grid-size', width);
                grid = new Array(width * width).fill(null);
                score = 0;
                currentLevel = 0;
                assignRandomQuest();
                initBoard();
            }
        });

        // --- Quests Logic ---
        const quests = [
            { type: 'score', target: 2000, desc: "2000 Puan Topla" },
            { type: 'color', target: 30, colorIndex: 0, desc: "Patlat" },
            { type: 'combo', target: 3, desc: "3 Kez Kombo (4+) Yap" },
            { type: 'score', target: 5000, desc: "5000 Puan Topla" },
            { type: 'color', target: 50, colorIndex: 0, desc: "Patlat" }
        ];
        let activeQuest = null;
        let questProgress = 0;

        function assignRandomQuest() {
            let q = quests[Math.floor(Math.random() * quests.length)];
            activeQuest = { ...q }; // Clone
            if(activeQuest.type === 'color') {
                activeQuest.colorIndex = Math.floor(Math.random() * levels[currentLevel].colors);
                activeQuest.desc = `<img src="${allCandyTypes[activeQuest.colorIndex]}" style="height:24px; margin-right:5px;"> ${activeQuest.target} Adet Patlat`;
            }
            questProgress = 0;
            updateQuestUI();
        }

        function updateQuestUI() {
            if(!activeQuest) return;
            const qb = document.getElementById('quest-container');
            if(questProgress >= activeQuest.target) {
                document.getElementById('quest-desc').innerHTML = "🌟 Görev Tamamlandı!";
                document.getElementById('quest-prog').innerText = "";
                qb.style.background = "rgba(0, 242, 254, 0.4)";
                qb.style.borderColor = "white";
                
                setTimeout(() => {
                    qb.style.background = "rgba(255, 255, 255, 0.4)";
                    qb.style.borderColor = "var(--primary-color)";
                    score += 1000;
                    sounds.levelup();
                    triggerDialog("Görev tamam! 1000 Puan bonus!", "jump.png");
                    updateUI();
                    assignRandomQuest();
                }, 3000);
            } else {
                document.getElementById('quest-desc').innerHTML = activeQuest.desc;
                document.getElementById('quest-prog').innerText = `${questProgress}/${activeQuest.target}`;
            }
        }

        // --- Candy Factory & Physics ---
        function spawnParticles(x, y, candyTypeUrl) {
            const numParticles = 8;
            for(let i=0; i<numParticles; i++) {
                let p = document.createElement('div');
                p.className = 'particle';
                p.style.backgroundImage = `url('${candyTypeUrl}')`;
                p.style.left = x + 'px';
                p.style.top = y + 'px';
                
                let angle = Math.random() * Math.PI * 2;
                let dist = 40 + Math.random() * 60;
                let tx = Math.cos(angle) * dist;
                let ty = Math.sin(angle) * dist;
                
                p.style.setProperty('--tx', tx + 'px');
                p.style.setProperty('--ty', ty + 'px');
                
                boardEl.appendChild(p);
                setTimeout(() => p.remove(), 600);
            }
        }

        function createCandy(col, row, isSpawning = false) {
            const candy = document.createElement('div');
            candy.className = 'candy';
            candy.setAttribute('draggable', true);
            
            const inner = document.createElement('div');
            inner.className = 'candy-inner';
            
            // Assign random color based on current level
            let allowedColors = levels[currentLevel].colors;
            // Prevent initial matches on board creation (if not spawning mid-game)
            let typeIndex;
            if(!isSpawning) {
                do {
                    typeIndex = Math.floor(Math.random() * allowedColors);
                } while (wouldMatchInitial(col, row, allCandyTypes[typeIndex]));
            } else {
                typeIndex = Math.floor(Math.random() * allowedColors);
            }
            
            inner.style.backgroundImage = `url('${allCandyTypes[typeIndex]}')`;
            inner.dataset.type = allCandyTypes[typeIndex];
            candy.appendChild(inner);
            
            // Set position
            candy.dataset.col = col;
            candy.dataset.row = row;
            candy.style.left = (col * cellSize) + '%';
            
            if(isSpawning) {
                candy.style.top = '-20%'; // Spawn above board
                // Force reflow
                candy.offsetHeight; 
                candy.style.top = (row * cellSize) + '%';
            } else {
                candy.style.top = (row * cellSize) + '%';
            }

            // Event listeners
            candy.addEventListener('mousedown', handlePointerDown);
            candy.addEventListener('touchstart', handlePointerDown, {passive: false});
            
            boardEl.appendChild(candy);
            return candy;
        }

        function wouldMatchInitial(col, row, type) {
            // Check left
            if (col >= 2) {
                let c1 = getCandyAt(col-1, row);
                let c2 = getCandyAt(col-2, row);
                if (c1 && c2 && c1.querySelector('.candy-inner').dataset.type === type && c2.querySelector('.candy-inner').dataset.type === type) return true;
            }
            // Check up
            if (row >= 2) {
                let c1 = getCandyAt(col, row-1);
                let c2 = getCandyAt(col, row-2);
                if (c1 && c2 && c1.querySelector('.candy-inner').dataset.type === type && c2.querySelector('.candy-inner').dataset.type === type) return true;
            }
            return false;
        }

        function getCandyAt(col, row) {
            if (col < 0 || col >= width || row < 0 || row >= width) return null;
            return grid[row * width + col];
        }

        function setCandyAt(col, row, candy) {
            if(candy) {
                candy.dataset.col = col;
                candy.dataset.row = row;
                candy.style.left = (col * cellSize) + '%';
                candy.style.top = (row * cellSize) + '%';
            }
            grid[row * width + col] = candy;
        }

        function initBoard() {
            boardEl.innerHTML = '';
            grid.fill(null);
            for (let row = 0; row < width; row++) {
                for (let col = 0; col < width; col++) {
                    let candy = createCandy(col, row, false);
                    setCandyAt(col, row, candy);
                }
            }
            updateUI();
            resetHintTimer();
        }

        // --- Interaction Logic ---
        let startX, startY;

        function handlePointerDown(e) {
            if(isProcessing) return;
            e.preventDefault();
            resetHintTimer();
            dragSrcCandy = e.currentTarget;
            if(e.type === 'touchstart') {
                startX = e.touches[0].clientX;
                startY = e.touches[0].clientY;
            } else {
                startX = e.clientX;
                startY = e.clientY;
                document.addEventListener('mouseup', handlePointerUp);
            }
            document.addEventListener('touchend', handlePointerUp);
        }

        function handlePointerUp(e) {
            document.removeEventListener('mouseup', handlePointerUp);
            document.removeEventListener('touchend', handlePointerUp);
            if(isProcessing || !dragSrcCandy) return;

            let endX, endY;
            if(e.type === 'touchend') {
                endX = e.changedTouches[0].clientX;
                endY = e.changedTouches[0].clientY;
            } else {
                endX = e.clientX;
                endY = e.clientY;
            }

            const diffX = endX - startX;
            const diffY = endY - startY;
            
            if (Math.abs(diffX) < 20 && Math.abs(diffY) < 20) {
                dragSrcCandy = null;
                return; // just a tap
            }

            let col = parseInt(dragSrcCandy.dataset.col);
            let row = parseInt(dragSrcCandy.dataset.row);
            let targetCol = col, targetRow = row;

            if (Math.abs(diffX) > Math.abs(diffY)) {
                if (diffX > 0 && col < width - 1) targetCol++; // Right
                else if (diffX < 0 && col > 0) targetCol--; // Left
            } else {
                if (diffY > 0 && row < width - 1) targetRow++; // Down
                else if (diffY < 0 && row > 0) targetRow--; // Up
            }

            if(targetCol !== col || targetRow !== row) {
                attemptSwap(col, row, targetCol, targetRow);
            }
            dragSrcCandy = null;
        }

        function attemptSwap(c1, r1, c2, r2) {
            isProcessing = true;
            let candy1 = getCandyAt(c1, r1);
            let candy2 = getCandyAt(c2, r2);

            // visually swap
            setCandyAt(c1, r1, candy2);
            setCandyAt(c2, r2, candy1);
            sounds.swap();

            setTimeout(() => {
                let matches = checkMatches();
                if(matches.length > 0) {
                    processMatches(matches);
                } else {
                    // Revert
                    setCandyAt(c1, r1, candy1);
                    setCandyAt(c2, r2, candy2);
                    sounds.swap();
                    setTimeout(() => { 
                        isProcessing = false; 
                        resetHintTimer();
                    }, 300);
                }
            }, 350); // wait for CSS transition
        }

        // --- Match Logic ---
        function checkMatches() {
            let matched = new Set();
            // Horizontal
            for(let r=0; r<width; r++) {
                for(let c=0; c<width-2; c++) {
                    let candy1 = getCandyAt(c, r);
                    let candy2 = getCandyAt(c+1, r);
                    let candy3 = getCandyAt(c+2, r);
                    if(candy1 && candy2 && candy3) {
                        let t1 = candy1.querySelector('.candy-inner').dataset.type;
                        let t2 = candy2.querySelector('.candy-inner').dataset.type;
                        let t3 = candy3.querySelector('.candy-inner').dataset.type;
                        if(t1 === t2 && t2 === t3) {
                            matched.add(candy1); matched.add(candy2); matched.add(candy3);
                        }
                    }
                }
            }
            // Vertical
            for(let c=0; c<width; c++) {
                for(let r=0; r<width-2; r++) {
                    let candy1 = getCandyAt(c, r);
                    let candy2 = getCandyAt(c, r+1);
                    let candy3 = getCandyAt(c, r+2);
                    if(candy1 && candy2 && candy3) {
                        let t1 = candy1.querySelector('.candy-inner').dataset.type;
                        let t2 = candy2.querySelector('.candy-inner').dataset.type;
                        let t3 = candy3.querySelector('.candy-inner').dataset.type;
                        if(t1 === t2 && t2 === t3) {
                            matched.add(candy1); matched.add(candy2); matched.add(candy3);
                        }
                    }
                }
            }
            return Array.from(matched);
        }

        function processMatches(matches) {
            sounds.match();
            
            // Score calculation
            const points = matches.length * 15;
            score += points;
            
            // Level progress
            updateUI();

            // Float score text
            let firstRect = matches[0].getBoundingClientRect();
            let wrapperRect = boardEl.getBoundingClientRect();
            let floatEl = document.createElement('div');
            floatEl.className = 'floating-score';
            floatEl.innerText = `+${points}`;
            floatEl.style.left = (firstRect.left - wrapperRect.left + 20) + 'px';
            floatEl.style.top = (firstRect.top - wrapperRect.top) + 'px';
            boardEl.appendChild(floatEl);
            setTimeout(() => floatEl.remove(), 1000);

            // Visual Popping & Particles
            matches.forEach(candy => {
                candy.classList.add('popping');
                let rect = candy.getBoundingClientRect();
                let wrapperRect = boardEl.getBoundingClientRect();
                let x = rect.left - wrapperRect.left + rect.width/2;
                let y = rect.top - wrapperRect.top + rect.height/2;
                spawnParticles(x, y, candy.querySelector('.candy-inner').dataset.type);

                // Remove from logical grid
                let c = parseInt(candy.dataset.col);
                let r = parseInt(candy.dataset.row);
                grid[r * width + c] = null;
            });

            // Update Quests
            if(activeQuest && questProgress < activeQuest.target) {
                if(activeQuest.type === 'score') {
                    questProgress += points;
                } else if(activeQuest.type === 'combo') {
                    if(matches.length > 3) questProgress++;
                } else if(activeQuest.type === 'color') {
                    let count = 0;
                    matches.forEach(m => {
                        if(m.querySelector('.candy-inner').dataset.type === allCandyTypes[activeQuest.colorIndex]) count++;
                    });
                    questProgress += count;
                }
                if(questProgress > activeQuest.target) questProgress = activeQuest.target;
                updateQuestUI();
            }

            // Zuzu Reaction
            if(matches.length > 4) {
                triggerDialog(getReactionText('awesome'), 'jump.png');
            } else if(matches.length > 3) {
                triggerDialog(getReactionText('good'), 'stand_happy.png');
            }

            setTimeout(() => {
                matches.forEach(candy => candy.remove());
                applyGravity();
            }, 300);
        }

        function applyGravity() {
            let movedAny = false;
            // 1. Move existing candies down
            for(let c=0; c<width; c++) {
                let emptySpaces = 0;
                for(let r=width-1; r>=0; r--) {
                    let candy = getCandyAt(c, r);
                    if(!candy) {
                        emptySpaces++;
                    } else if(emptySpaces > 0) {
                        // Move this candy down by emptySpaces
                        grid[r * width + c] = null; // old spot
                        setCandyAt(c, r + emptySpaces, candy);
                        movedAny = true;
                    }
                }
                
                // 2. Spawn new candies at top for this column
                for(let i=0; i<emptySpaces; i++) {
                    let newRow = i; 
                    let newCandy = createCandy(c, newRow, true);
                    setCandyAt(c, newRow, newCandy);
                    movedAny = true;
                }
            }

            if(movedAny) sounds.fall();

            setTimeout(() => {
                let newMatches = checkMatches();
                if(newMatches.length > 0) {
                    processMatches(newMatches); // Combo chain
                } else {
                    isProcessing = false;
                    resetHintTimer();
                }
            }, 500); // Wait for fall animation
        }

        // --- Hint System ---
        let hintTimeout = null;

        function resetHintTimer() {
            clearTimeout(hintTimeout);
            document.querySelectorAll('.hint-anim').forEach(el => el.classList.remove('hint-anim'));
            hintTimeout = setTimeout(showHint, 10000);
        }

        function showHint() {
            if(isProcessing) return;
            let pair = findHint();
            if(pair) {
                pair[0].classList.add('hint-anim');
                pair[1].classList.add('hint-anim');
            }
        }

        function findHint() {
            for(let r=0; r<width; r++) {
                for(let c=0; c<width; c++) {
                    if(c < width - 1 && trySwapForHint(c, r, c+1, r)) return [getCandyAt(c, r), getCandyAt(c+1, r)];
                    if(r < width - 1 && trySwapForHint(c, r, c, r+1)) return [getCandyAt(c, r), getCandyAt(c, r+1)];
                }
            }
            return null;
        }

        function trySwapForHint(c1, r1, c2, r2) {
            let candy1 = getCandyAt(c1, r1);
            let candy2 = getCandyAt(c2, r2);
            if(!candy1 || !candy2) return false;
            
            grid[r1 * width + c1] = candy2;
            grid[r2 * width + c2] = candy1;
            
            let matchFound = checkMatchesForHint();
            
            grid[r1 * width + c1] = candy1;
            grid[r2 * width + c2] = candy2;
            
            return matchFound;
        }

        function checkMatchesForHint() {
            for(let r=0; r<width; r++) {
                for(let c=0; c<width-2; c++) {
                    let c1 = getCandyAt(c, r), c2 = getCandyAt(c+1, r), c3 = getCandyAt(c+2, r);
                    if(c1 && c2 && c3) {
                        if(c1.querySelector('.candy-inner').dataset.type === c2.querySelector('.candy-inner').dataset.type && 
                           c2.querySelector('.candy-inner').dataset.type === c3.querySelector('.candy-inner').dataset.type) return true;
                    }
                }
            }
            for(let c=0; c<width; c++) {
                for(let r=0; r<width-2; r++) {
                    let c1 = getCandyAt(c, r), c2 = getCandyAt(c, r+1), c3 = getCandyAt(c, r+2);
                    if(c1 && c2 && c3) {
                        if(c1.querySelector('.candy-inner').dataset.type === c2.querySelector('.candy-inner').dataset.type && 
                           c2.querySelector('.candy-inner').dataset.type === c3.querySelector('.candy-inner').dataset.type) return true;
                    }
                }
            }
            return false;
        }

        // --- UI & Level System ---
        function updateUI() {
            let target = levels[currentLevel].target;
            scoreTxt.innerText = score;
            levelTxt.innerText = currentLevel + 1;
            targetTxt.innerText = target === Infinity ? '∞' : target;
            
            let percentage = target === Infinity ? 100 : Math.min((score / target) * 100, 100);
            levelBar.style.width = percentage + '%';

            // Check Level up
            if(score >= target && target !== Infinity) {
                levelUp();
            }
        }

        function levelUp() {
            currentLevel++;
            sounds.levelup();
            levelUpMsg.style.opacity = '1';
            triggerDialog("Yeni bir bölüm! Harika gidiyorsun!", "jump.png");
            setTimeout(() => {
                levelUpMsg.style.opacity = '0';
                
                // Check if grid needs to increase
                let newWidth = calculateGridSize();
                if(newWidth !== width) {
                    width = newWidth;
                    cellSize = 100 / width;
                    document.documentElement.style.setProperty('--grid-size', width);
                    grid = new Array(width * width).fill(null);
                    initBoard();
                    triggerDialog("Tahta büyüdü! Oyun şimdi daha heyecanlı!", "jump.png");
                }
            }, 2000);
            updateUI();
        }

        // --- Zuzu VN System ---
        const zuzuImg = document.getElementById('zuzu-img');
        const dialogText = document.getElementById('dialog-text');
        
        const dialogues = {
            start: ["Merhaba! Hadi biraz oyun oynayalım.", "Bugün harika görünüyorsun!", "Rahatla ve oyunun tadını çıkar..."],
            good: ["Güzel hamle!", "Tatlı!", "İşte böyle!"],
            awesome: ["İnanılmaz!", "Zuzu bunu çok sevdi!", "Harika kombo!"],
            random: [
                "seni seviyorum damla", 
                "Gökyüzü bugün ne kadar da güzel.", 
                "Biraz dinlenmek ister misin?", 
                "Tatlı şeyler her zaman iyi gelir...", 
                "Derin bir nefes al...",
                "Bugün de her zamanki gibi harikasın!",
                "Kendine inanmayı asla bırakma.",
                "Seninle oyun oynamak çok eğlenceli!",
                "Ne kadar zekisin, harika hamleler yapıyorsun!",
                "Gülümsemek sana çok yakışıyor.",
                "Eğer yorulduysan bana söyleyebilirsin.",
                "Yıldızlar kadar parlaksın!",
                "Gözlerini kapatıp bir dilek tut...",
                "Başaramayacağın hiçbir şey yok!",
                "Her şey çok güzel olacak, inanıyorum."
            ]
        };

        let lastDialogText = "";
        function getReactionText(category) {
            const arr = dialogues[category] || dialogues.random;
            if(arr.length <= 1) return arr[0];
            let text = "";
            let attempts = 0;
            do {
                text = arr[Math.floor(Math.random() * arr.length)];
                attempts++;
            } while (text === lastDialogText && attempts < 10);
            lastDialogText = text;
            return text;
        }

        let typeWriterTimeout;
        function triggerDialog(text, imgFile = 'stand_happy.png') {
            zuzuImg.src = `Zuzu/${imgFile}`;
            clearTimeout(typeWriterTimeout);
            dialogText.innerText = '';
            
            let i = 0;
            function type() {
                if (i < text.length) {
                    dialogText.innerText += text.charAt(i);
                    if(text.charAt(i) !== ' ') { // Only play sound on non-space chars
                        if(i % 3 === 0) sounds.talk();
                    }
                    i++;
                    typeWriterTimeout = setTimeout(type, 30 + Math.random()*30);
                } else {
                    setTimeout(() => {
                        zuzuImg.src = 'Zuzu/stand_happy.png';
                    }, 4000);
                }
            }
            type();
        }

        // Random dialogue triggers
        setInterval(() => {
            if(!isProcessing && Math.random() > 0.7) {
                const states = ['sleep.png', 'sleepy.png', 'sitting.png', 'half.png'];
                const randState = states[Math.floor(Math.random() * states.length)];
                triggerDialog(getReactionText('random'), randState);
            }
        }, 15000);

        // --- Background Music ---
        const playlist = ['music/msc1.mp3', 'music/msc2.mp3'];
        let currentTrack = 0;
        const bgMusic = new Audio();
        bgMusic.volume = 0.3; // soft background volume
        bgMusic.addEventListener('ended', () => {
            currentTrack = (currentTrack + 1) % playlist.length;
            bgMusic.src = playlist[currentTrack];
            bgMusic.play().catch(e => console.log(e));
        });

        function startMusic() {
            bgMusic.src = playlist[currentTrack];
            bgMusic.play().catch(e => console.log("Audio play failed:", e));
        }

        // --- Boot ---
        document.getElementById('play-btn').addEventListener('click', () => {
            document.getElementById('splash-screen').style.opacity = '0';
            if(audioCtx.state === 'suspended') audioCtx.resume();
            startMusic();
            
            setTimeout(() => {
                document.getElementById('splash-screen').style.display = 'none';
                document.getElementById('game-container').style.display = 'flex';
                initBoard();
                assignRandomQuest();
                triggerDialog(getReactionText('start'), 'stand_happy.png');
            }, 1000);
        });

    </script>
</body>
